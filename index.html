        return;

        skipNativeAuth: true,

        idToken: result.credential?.idToken,

      });

    function dataURLtoBlob(dataURL) {
      const parts = dataURL.split(',');
      const mime = parts[0].match(/:(.*?);/)[1];
      const raw = atob(parts[1]);
      const arr = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
      return new Blob([arr], { type: mime });
    }

    function generateQRDataURL(text) {
      const qr = qrcode(0, "M");
      qr.addData(text);
      qr.make();
      const modules = qr.getModuleCount();
      const cellSize = 8;
      const margin = cellSize * 2;
      const size = modules * cellSize + margin * 2;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#fae4cf";
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = "#0a0f23";
      for (let row = 0; row < modules; row++) {
        for (let col = 0; col < modules; col++) {
          if (qr.isDark(row, col)) {
            ctx.fillRect(col * cellSize + margin, row * cellSize + margin, cellSize, cellSize);
          }
        }
      }
      return canvas.toDataURL("image/png");
    }

    const VAULT_DB = "PaktVault";
    const VAULT_STORE = "ndas";
    const VAULT_VERSION = 1;

    function openVaultDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(VAULT_DB, VAULT_VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(VAULT_STORE)) {
            const store = db.createObjectStore(VAULT_STORE, { keyPath: "id" });
            store.createIndex("createdAt", "createdAt", { unique: false });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function vaultSave(ndaRecord) {
      const db = await openVaultDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(VAULT_STORE, "readwrite");
        tx.objectStore(VAULT_STORE).put(ndaRecord);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function vaultGetAll() {
      const db = await openVaultDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(VAULT_STORE, "readonly");
        const req = tx.objectStore(VAULT_STORE).index("createdAt").getAll();
        req.onsuccess = () => resolve(req.result.reverse());
        req.onerror = () => reject(req.error);
      });
    }

    async function vaultGet(id) {
      const db = await openVaultDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(VAULT_STORE, "readonly");
        const req = tx.objectStore(VAULT_STORE).get(id);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function vaultDelete(id) {
      const db = await openVaultDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(VAULT_STORE, "readwrite");
        tx.objectStore(VAULT_STORE).delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    function getWorkplaceDisclosureSection(state, sectionNum) {
      const data = STATE_DATA[state];
      if (!data) return null;

      if (data.tier === 1) {
        const specifics = {
          "California": `Nothing in this agreement prevents you from discussing or disclosing information about unlawful acts in the workplace, such as harassment or discrimination or any other conduct that you have reason to believe is unlawful. This provision is included pursuant to California Senate Bill 331 (the "Silenced No More Act") and applies to all disclosures relating to conditions in the workplace, including but not limited to harassment, discrimination, or retaliation based on any protected class under California law.`,
          "Washington": `Nothing in this agreement prevents you from discussing or disclosing information about unlawful acts in the workplace, including but not limited to harassment, discrimination, retaliation, wage-and-hour violations, or any other conduct that you have reason to believe is unlawful. This provision is included pursuant to Washington's Silenced No More Act (ESHB 1795), which covers all forms of illegal workplace conduct and applies retroactively to invalidate prior conflicting provisions.`,
          "Illinois": `Nothing in this agreement prevents you from discussing or disclosing information about unlawful employment practices, including but not limited to harassment, discrimination, or retaliation. You have the right to make truthful statements or disclosures regarding any unlawful employment practice. This provision is included pursuant to the Illinois Workplace Transparency Act (as amended 2026).`,
          "Oregon": `Nothing in this agreement prevents you from discussing or disclosing information about harassment, discrimination, or other unlawful conduct in the workplace. You retain the right to discuss workplace conditions and report unlawful behavior without restriction. This provision is included pursuant to the Oregon Workplace Fairness Act (SB 488).`,
          "Hawaii": `Nothing in this agreement prevents you from reporting or disclosing information about sexual harassment or sexual assault to the Hawaii Civil Rights Commission or any other governmental agency. This provision is included pursuant to Hawaii Act 47 (2023).`,
        };
        const verbatim = specifics[state] || specifics["California"];
        return {
          t: `${sectionNum}. Permitted Disclosures Regarding Unlawful Conduct`,
          b: `${verbatim} This Agreement does not limit the Receiving Party's right to: (a) report suspected violations of law to any governmental agency or entity, including but not limited to the Equal Employment Opportunity Commission, the Department of Labor, the Securities and Exchange Commission, or any state or local agency; (b) participate in any governmental investigation; or (c) file a charge or complaint with any governmental agency.`
        };
      }

      if (data.tier === 2) {
        const statRefs = {
          "Colorado": `the Colorado Protecting Opportunities and Workers' Rights Act (POWR Act), which requires carve-outs for disclosures to government agencies, attorneys, and family members`,
          "Connecticut": `Connecticut Public Act 19-16, which prohibits NDAs in sexual harassment settlements unless specifically requested by the employee`,
          "Maine": `Maine LD 965 (2022), which limits NDAs for discrimination and harassment claims unless part of a settlement requested by the employee`,
          "Maryland": `the Maryland Disclosing Sexual Harassment in the Workplace Act`,
          "Massachusetts": `Massachusetts law governing harassment settlement agreements, which requires such agreements to be mutually agreed upon and employee-revocable for 15 days`,
          "Nevada": `Nevada AB 192 (2025/26), which prevents NDAs from silencing harassment victims`,
          "New Jersey": `New Jersey S121, which prohibits NDAs in harassment and discrimination cases and requires a disclaimer that the NDA does not prevent the employee from speaking with certain authorities`,
          "New Mexico": `New Mexico law prohibiting NDAs regarding sexual harassment`,
          "New York": `New York General Obligations Law § 5-336, which permits NDAs in harassment settlements only if requested by the employee and includes a 21-day review period and 7-day revocation period`,
          "Vermont": `Vermont Act 183, which prohibits NDAs for sexual harassment`,
        };

    function wrapText(ctx, text, maxWidth) {
      const words = text.split(" ");
      const lines = [];
      let current = "";
      for (const word of words) {
        const test = current ? current + " " + word : word;
        if (ctx.measureText(test).width > maxWidth) { if (current) lines.push(current); current = word; }
        else current = test;
      }
      if (current) lines.push(current);
      return lines;
    }

    function SignatureCanvas({ label, canvasRef, onDraw }) {
      const [hasDrawn, setHasDrawn] = useState(false);
      const drawingRef = useRef(false);
      const autumn = "#fae4cf";
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * 2; canvas.height = rect.height * 2;
        const ctx = canvas.getContext("2d");
        ctx.scale(2, 2); ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.lineWidth = 2.5; ctx.strokeStyle = "#0a0f23";
        function getPos(e) { const r = canvas.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return { x: t.clientX - r.left, y: t.clientY - r.top }; }
        function onTouchStart(e) { e.preventDefault(); e.stopPropagation(); drawingRef.current = true; setHasDrawn(true); onDraw(); const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
        function onTouchMove(e) { if (!drawingRef.current) return; e.preventDefault(); e.stopPropagation(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
        function onTouchEnd(e) { e.preventDefault(); e.stopPropagation(); drawingRef.current = false; }
        function onMouseDown(e) { drawingRef.current = true; setHasDrawn(true); onDraw(); const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
        function onMouseMove(e) { if (!drawingRef.current) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
        function onMouseUp() { drawingRef.current = false; }
        function onTouchCancel(e) { e.preventDefault(); e.stopPropagation(); drawingRef.current = false; }
        canvas.addEventListener("touchstart", onTouchStart, { passive: false });
        canvas.addEventListener("touchmove", onTouchMove, { passive: false });
        canvas.addEventListener("touchend", onTouchEnd, { passive: false });
        canvas.addEventListener("touchcancel", onTouchCancel, { passive: false });
        canvas.addEventListener("mousedown", onMouseDown);
        canvas.addEventListener("mousemove", onMouseMove);
        canvas.addEventListener("mouseup", onMouseUp);
        canvas.addEventListener("mouseleave", onMouseUp);
        return () => {
          canvas.removeEventListener("touchstart", onTouchStart);
          canvas.removeEventListener("touchmove", onTouchMove);
          canvas.removeEventListener("touchend", onTouchEnd);
          canvas.removeEventListener("touchcancel", onTouchCancel);
          canvas.removeEventListener("mousedown", onMouseDown);
          canvas.removeEventListener("mousemove", onMouseMove);
          canvas.removeEventListener("mouseup", onMouseUp);
          canvas.removeEventListener("mouseleave", onMouseUp);
        };
      }, []);
      const clear = () => { const c = canvasRef.current; c.getContext("2d").clearRect(0, 0, c.width, c.height); setHasDrawn(false); };
      const sans = "'Outfit', sans-serif";
      const firm = "#0a0f23";
      return (
        <div style={{ marginBottom: 18 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 15, fontWeight: 700, color: autumn, letterSpacing: ".04em", textTransform: "uppercase", fontFamily: sans }}>{label}</span>
            {hasDrawn && <button onClick={clear} style={{ fontSize: 15, color: "#c0392b", background: "none", border: "none", cursor: "pointer", fontWeight: 700, fontFamily: sans }}>Clear</button>}
          </div>
          <div onTouchStart={(e) => { e.stopPropagation(); }} onTouchEnd={(e) => { e.stopPropagation(); }} onTouchMove={(e) => { e.stopPropagation(); }} style={{ position: "relative", borderRadius: 12, overflow: "hidden", border: "2px dashed rgba(10,15,35,.2)", background: "#fdf6ef", touchAction: "none" }}>
            <canvas ref={canvasRef} style={{ display: "block", width: "100%", height: 140, touchAction: "none", cursor: "crosshair" }} />
            {!hasDrawn && <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none", color: "rgba(10,15,35,.4)", fontSize: 16, fontFamily: sans, textAlign: "center", padding: "0 12px" }}>{label + " - sign here"}</div>}
            <div style={{ position: "absolute", bottom: 20, left: 20, right: 20, height: 1, background: "rgba(10,15,35,.15)", pointerEvents: "none" }} />
          </div>

      );

    /* ══════════════════════════════════════════════════════════
       PARTY B VERIFICATION SCREEN
       ══════════════════════════════════════════════════════════ */

    function VerifyScreen({ sessionId }) {
      const [status, setStatus] = useState("loading");
      const [sessionData, setSessionData] = useState(null);
      const [error, setError] = useState(null);
      const sans = "'Outfit', sans-serif";
      const firm = "#0a0f23";
      const autumn = "#fae4cf";

      useEffect(() => {
        const ref = db.ref("sessions/" + sessionId);
        ref.once("value").then(snap => {
          const data = snap.val();
          if (!data || data.status === "completed" || data.status === "verified") {
            setStatus("expired");
          } else {
            setSessionData(data);
            setStatus("ready");
          }
        }).catch(() => setStatus("error"));
      }, [sessionId]);

      async function handleVerify() {
        setStatus("verifying");
        try {
          const challengeBytes = new Uint8Array(32);
          crypto.getRandomValues(challengeBytes);

          const credential = await navigator.credentials.create({
            publicKey: {
              challenge: challengeBytes,
              rp: { name: "Pakt NDA", id: window.location.hostname },
              user: {
                id: new Uint8Array(16).map(() => Math.floor(Math.random() * 256)),
                name: (sessionData && sessionData.party2) || "signer",
                displayName: (sessionData && sessionData.party2) || "NDA Signer"
              },
              pubKeyCredParams: [
                { alg: -7, type: "public-key" },
                { alg: -257, type: "public-key" }
              ],
              authenticatorSelection: {
                authenticatorAttachment: "platform",
                residentKey: "discouraged",
                userVerification: "required"
              },
              timeout: 60000,
              attestation: "direct"
            }
          });

          if (credential) {
            const credIdArray = new Uint8Array(credential.rawId);
            const credIdHex = Array.from(credIdArray).map(b => b.toString(16).padStart(2, "0")).join("");

            await db.ref("sessions/" + sessionId).update({
              status: "verified",
              verifiedAt: firebase.database.ServerValue.TIMESTAMP,
              credentialId: credIdHex,
              authenticatorType: credential.authenticatorAttachment || "platform",
              userAgent: navigator.userAgent
            });
            setStatus("done");
          }
        } catch (err) {
          if (err.name === "NotAllowedError") {
            setError("Verification was cancelled. Tap the button and then tap 'Continue' on the prompt to verify with Face ID.");
          } else if (err.name === "NotSupportedError") {
            setError("Your device does not support biometric authentication.");
          } else {
            setError("Verification failed: " + err.message);
          }
          setStatus("ready");
        }
      }

      return (
        <div style={{ maxWidth: 500, margin: "0 auto", padding: "40px 16px", fontFamily: "'Instrument Serif', Georgia, serif", minHeight: "100dvh", background: autumn }}>
          <div style={{ textAlign: "center", marginBottom: 30 }}>
            <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 52, height: 52, borderRadius: 14, background: firm, marginBottom: 10 }}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={autumn} strokeWidth="2"><path d="M12 2a5 5 0 015 5v3H7V7a5 5 0 015-5z"/><rect x="3" y="10" width="18" height="12" rx="2"/><circle cx="12" cy="16" r="1.5"/></svg>
            </div>
            <img src="pakt-logo.png" alt="Pakt" style={{ width: 160, height: "auto", margin: "0 auto 8px", display: "block", filter: "brightness(0) invert(5%)" }} />
            <p style={{ fontSize: 20, color: "rgba(10,15,35,.55)", margin: 0, fontFamily: sans, fontWeight: 500 }}>Identity Verification</p>
          </div>

          {status === "loading" && (
            <div style={{ textAlign: "center", padding: 40 }}>
              <div style={{ fontSize: 18, color: "rgba(10,15,35,.4)", fontFamily: sans }}>Loading verification session...</div>
            </div>
          )}

          {status === "expired" && (
            <div style={{ background: "#fff", borderRadius: 16, padding: 24, textAlign: "center", border: "1px solid rgba(10,15,35,.08)" }}>
              <div style={{ fontSize: 45, marginBottom: 12 }}>&#9888;</div>
              <h3 style={{ fontSize: 23, color: firm, margin: "0 0 8px" }}>Session Expired</h3>
              <p style={{ fontSize: 18, color: "rgba(10,15,35,.4)", fontFamily: sans, margin: 0 }}>This verification link is no longer valid.<br/>Ask the other party to generate a new QR code.</p>
            </div>
          )}

          {status === "error" && (
            <div style={{ background: "#fff", borderRadius: 16, padding: 24, textAlign: "center", border: "1px solid rgba(10,15,35,.08)" }}>
              <h3 style={{ fontSize: 23, color: "#c0392b", margin: "0 0 8px" }}>Connection Error</h3>
              <p style={{ fontSize: 18, color: "rgba(10,15,35,.4)", fontFamily: sans, margin: 0 }}>Could not connect to the verification server.<br/>Check your internet connection and try again.</p>
            </div>
          )}

          {status === "ready" && sessionData && (
            <div>
              <div style={{ background: "#fff", borderRadius: 16, padding: 20, border: "1px solid rgba(10,15,35,.08)", marginBottom: 16, boxShadow: "0 2px 16px rgba(10,15,35,.04)" }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: "rgba(10,15,35,.35)", fontFamily: sans, letterSpacing: ".06em", textTransform: "uppercase", marginBottom: 12 }}>NDA Details</div>
                {[["From", sessionData.party1], ["To", sessionData.party2], ["Purpose", sessionData.purpose]].map(([k, v]) => (
                  <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid rgba(10,15,35,.06)", fontSize: 18, fontFamily: sans }}>
                    <span style={{ color: "rgba(10,15,35,.4)" }}>{k}</span>
                    <span style={{ color: firm, fontWeight: 600, textAlign: "right", maxWidth: "60%" }}>{v}</span>
                  </div>
                ))}
              </div>
              {error && (
                <div style={{ background: "rgba(192,57,43,.08)", borderRadius: 12, padding: "12px 16px", marginBottom: 16, border: "1px solid rgba(192,57,43,.15)" }}>
                  <div style={{ fontSize: 16, color: "#c0392b", fontFamily: sans }}>{error}</div>
                </div>
              )}
              <button onClick={handleVerify} style={{ width: "100%", padding: "18px", fontSize: 21, fontWeight: 700, border: "none", borderRadius: 14, cursor: "pointer", fontFamily: sans, color: autumn, background: firm, boxShadow: "0 4px 18px rgba(10,15,35,.35)", letterSpacing: ".01em" }}>
                Verify My Identity
              </button>
              <p style={{ fontSize: 17, color: "rgba(10,15,35,.55)", textAlign: "center", marginTop: 16, lineHeight: 1.7, fontFamily: sans }}>This is the biometric verification step. Your device will use Face ID, Touch ID, or your passcode to confirm your identity. Follow the on-screen prompts to complete verification.</p>
            </div>
          )}

          {status === "verifying" && (
            <div style={{ textAlign: "center", padding: 40 }}>
              <div style={{ fontSize: 18, color: "rgba(10,15,35,.5)", fontFamily: sans }}>Waiting for biometric authentication...</div>
            </div>
          )}

          {status === "done" && (
            <div style={{ textAlign: "center" }}>
              <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 72, height: 72, borderRadius: "50%", background: "#2B4230", boxShadow: "0 6px 28px rgba(43,66,48,.3)", marginBottom: 14 }}>
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <h3 style={{ fontSize: 25, fontWeight: 700, color: "#2B4230", margin: "0 0 8px" }}>Identity Verified</h3>
              <p style={{ fontSize: 18, color: "rgba(10,15,35,.45)", fontFamily: sans, margin: 0, lineHeight: 1.6 }}>Your biometric verification has been recorded.<br/>You can close this page now.</p>
            </div>
          )}
        </div>
      );
    }

        setError(null);

          setError(true);

            )}

            {bioStatus === "verified" && (
              <div style={{ textAlign: "center", marginBottom: 16 }}>
                <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 72, height: 72, borderRadius: "50%", background: "#2B4230", boxShadow: "0 6px 28px rgba(43,66,48,.3)", marginBottom: 14, animation: "bioSuccess .4s ease-out" }}>
                  <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h3 style={{ fontSize: 23, fontWeight: 700, color: autumn, margin: "0 0 4px" }}>Identity Verified</h3>
                <p style={{ fontSize: 16, color: "rgba(10,15,35,.45)", fontFamily: sans, margin: "0 0 6px" }}>{form.party2} verified via biometric authentication</p>
                {bioResult && (
                  <div style={{ background: "rgba(250,228,207,.06)", borderRadius: 12, padding: "12px 16px", display: "inline-block", marginTop: 8 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: autumn, fontFamily: sans, letterSpacing: ".04em", textTransform: "uppercase" }}>Biometric Attestation Recorded</div>
                    <div style={{ fontSize: 14, color: "rgba(250,228,207,.7)", fontFamily: sans, marginTop: 2 }}>
                      {new Date(bioResult.verifiedAt).toLocaleString()}
                    </div>
                  </div>
                )}
              </div>
            )}

            <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
              {bioStatus === "waiting" && (
                <button style={{ ...btnO, flex: 1, fontSize: 18 }} onClick={skipBiometric}>Skip Verification</button>
              )}
              {bioStatus === "verified" && (
                <button style={{ ...btnG, flex: 1, fontSize: 20 }} onClick={proceedToDone}>View Agreement &rarr;</button>
              )}
            </div>
            {bioStatus === "waiting" && (
              <div style={{ background: "rgba(250,228,207,.08)", borderRadius: 14, padding: "16px 18px", marginTop: 16, border: "1px solid rgba(250,228,207,.1)" }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: autumn, fontFamily: sans, marginBottom: 8, letterSpacing: ".02em" }}>What happens next?</div>
                <div style={{ fontSize: 14, color: "rgba(250,228,207,.7)", fontFamily: sans, lineHeight: 1.7 }}>
                  When the other party scans this QR code, their phone will prompt them to verify their identity using Face ID, Touch ID, or their device passcode. This creates a biometric proof of identity that gets attached to the signed NDA as an additional layer of security.<br/><br/>
                  To connect both devices, party names and purpose are temporarily sent to a secure server and automatically deleted once verification completes.<br/><br/>
                  If the other party is not physically present, you can skip this step.
                </div>
              </div>
            )}
          </div>
        );
      }

      if (step === 4) {
        const fd = fmtDate(form.date);
        const safeName1 = form.party1.replace(/\s+/g, "_");
        const safeName2 = form.party2.replace(/\s+/g, "_");
        return (
          <div key="step4" className="step-animate" style={{ maxWidth: 500, margin: "0 auto", padding: "24px 16px", fontFamily: "'Instrument Serif', Georgia, serif", background: "#0a0f23", minHeight: "100dvh" }}>
            <div style={{ textAlign: "center", marginBottom: 20 }}>
              <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 64, height: 64, borderRadius: "50%", background: "#2B4230", boxShadow: "0 4px 20px rgba(43,66,48,.3)", marginBottom: 12 }}>
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <h2 style={{ fontSize: 28, fontWeight: 400, color: autumn, margin: "0 0 8px", fontFamily: "'Instrument Serif', Georgia, serif" }}>Agreement Signed</h2>
              <div style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "rgba(250,228,207,.08)", borderRadius: 20, padding: "6px 14px", marginBottom: 4, border: "1px solid rgba(250,228,207,.12)" }}>
                <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="6" fill="#fae4cf"/><polyline points="3 6 5 8 9 4" fill="none" stroke="#0a0f23" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                <span style={{ fontSize: 14, fontWeight: 600, color: autumn, fontFamily: sans, letterSpacing: ".04em" }}>Saved to Vault</span>
              </div>
              <p style={{ fontSize: 15, color: "rgba(250,228,207,.7)", margin: "6px 0 0", fontFamily: sans }}>Stored securely in the app. Visit your Vault to download all files at once.</p>
            </div>
            {ndaImage && (
              <div style={{ marginBottom: 16 }}>
                <div style={{ borderRadius: 12, overflow: "hidden", border: "1px solid rgba(250,228,207,.08)" }}><img src={ndaImage} alt="Signed NDA Document" style={{ width: "100%", display: "block" }} /></div>
                <button onClick={() => shareImage(ndaImage, `Pakt_NDA_${safeName1}_${safeName2}_${form.date}.png`)} style={{ width: "100%", marginTop: 10, padding: "14px", fontSize: 17, fontWeight: 700, border: "none", borderRadius: 12, background: autumn, color: firm, cursor: "pointer", fontFamily: sans, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, letterSpacing: ".02em", boxShadow: "0 4px 18px rgba(250,228,207,.15)" }}>
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                  Save or Share Agreement
                </button>
              </div>
            )}
            {videoURL && (
              <div style={{ background: "rgba(250,228,207,.03)", borderRadius: 16, border: "1px solid rgba(250,228,207,.06)", overflow: "hidden", marginBottom: 16 }}>
                <div style={{ padding: "13px 16px 11px", borderBottom: "1px solid rgba(250,228,207,.06)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: autumn, fontFamily: sans, letterSpacing: ".08em", textTransform: "uppercase" }}>Witness Recording</div>
                    <div style={{ fontSize: 14, color: "rgba(250,228,207,.25)", fontFamily: sans, marginTop: 2 }}>{form.party2} &middot; {fd}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 5, background: "rgba(250,228,207,.08)", borderRadius: 20, padding: "4px 10px", border: "1px solid rgba(250,228,207,.12)" }}>
                    <svg width="8" height="8" viewBox="0 0 10 10"><circle cx="5" cy="5" r="5" fill="#fae4cf"/></svg>
                    <span style={{ fontSize: 11, fontWeight: 700, color: autumn, fontFamily: sans, letterSpacing: ".08em" }}>CAPTURED</span>
                  </div>
                </div>
                <video src={videoURL} controls playsInline style={{ width: "100%", display: "block", background: "#050810", maxHeight: 230 }} />
                <div style={{ padding: "10px 14px" }}>
                  <a href={videoURL} download={`Pakt_${safeName1}_${safeName2}_${form.date}.mp4`} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: "11px", borderRadius: 10, background: "rgba(250,228,207,.06)", color: autumn, fontSize: 15, fontWeight: 600, fontFamily: sans, textDecoration: "none", letterSpacing: ".03em", border: "1px solid rgba(250,228,207,.08)" }}>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    Save Recording
                  </a>
                </div>
              </div>
            )}
            {bioStatus === "verified" && bioResult && (
              <div style={{ background: "rgba(250,228,207,.04)", borderRadius: 16, border: "1px solid rgba(250,228,207,.1)", overflow: "hidden", marginBottom: 16 }}>
                <div style={{ padding: "13px 16px 11px", borderBottom: "1px solid rgba(250,228,207,.08)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: autumn, fontFamily: sans, letterSpacing: ".06em", textTransform: "uppercase" }}>Biometric Verification</div>
                    <div style={{ fontSize: 14, color: "rgba(250,228,207,.7)", fontFamily: sans, marginTop: 2 }}>{form.party2} &middot; {new Date(bioResult.verifiedAt).toLocaleString()}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 5, background: "#d4f0e3", borderRadius: 20, padding: "4px 10px" }}>
                    <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="5" fill="#2B4230"/><polyline points="2.5 5 4 6.5 7.5 3" fill="none" stroke="#fff" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    <span style={{ fontSize: 13, fontWeight: 700, color: "#2B4230", fontFamily: sans, letterSpacing: ".05em" }}>VERIFIED</span>
                  </div>
                </div>
                <div style={{ padding: "10px 16px 14px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", fontSize: 15, fontFamily: sans }}>
                    <span style={{ color: "rgba(250,228,207,.7)" }}>Method</span>
                    <span style={{ color: autumn, fontWeight: 600 }}>Face ID / Touch ID</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", fontSize: 15, fontFamily: sans }}>
                    <span style={{ color: "rgba(250,228,207,.7)" }}>Credential</span>
                    <span style={{ color: autumn, fontWeight: 600, fontSize: 13, fontFamily: "monospace" }}>{bioResult.credentialId ? bioResult.credentialId.substring(0, 16) + "..." : "N/A"}</span>
                  </div>
                </div>
              </div>
            )}
            {receiptImage && (
              <div style={{ background: "#fff", borderRadius: 16, border: "1px solid rgba(10,15,35,.08)", overflow: "hidden", marginBottom: 16, boxShadow: "0 2px 16px rgba(10,15,35,.04)" }}>
                <div style={{ padding: "13px 16px 11px", borderBottom: "1px solid rgba(10,15,35,.06)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: firm, fontFamily: sans, letterSpacing: ".06em", textTransform: "uppercase" }}>Verification Receipt</div>
                    <div style={{ fontSize: 14, color: "rgba(10,15,35,.35)", fontFamily: sans, marginTop: 2 }}>Full cryptographic audit trail</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 5, background: "rgba(43,66,48,.12)", borderRadius: 20, padding: "4px 10px" }}>
                    <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="5" fill="#2B4230"/><polyline points="2.5 5 4 6.5 7.5 3" fill="none" stroke="#fff" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    <span style={{ fontSize: 13, fontWeight: 700, color: "#2B4230", fontFamily: sans, letterSpacing: ".05em" }}>READY</span>
                  </div>
                </div>
                <div style={{ padding: 10, background: "#f8faf9" }}>
                  <img src={receiptImage} alt="Verification Receipt" style={{ width: "100%", display: "block", borderRadius: 8 }} />
                </div>
                <div style={{ padding: "0 10px 10px" }}>
                  <button onClick={() => shareImage(receiptImage, `Pakt_Receipt_${safeName1}_${safeName2}_${form.date}.png`)} style={{ width: "100%", padding: "14px", fontSize: 17, fontWeight: 700, border: "none", borderRadius: 12, background: "#2B4230", color: "#fff", cursor: "pointer", fontFamily: sans, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, letterSpacing: ".02em", boxShadow: "0 4px 18px rgba(43,66,48,.2)" }}>
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                    Save or Share Receipt
                  </button>
                </div>
              </div>
            )}
            <div style={{ background: "rgba(250,228,207,.03)", borderRadius: 14, padding: 18, marginBottom: 20, border: "1px solid rgba(250,228,207,.06)" }}>
              {[["Parties", `${form.party1} & ${form.party2}`], ["Purpose", form.purpose], ["Type", "Unilateral NDA"], ["Duration", "2 years + 3 year survival"], ["Governing Law", `State of ${form.state}`], ["Sections", `${sections.length}`], ["Date", fd], ["Verification", [videoURL && "Video", "Signature", bioStatus === "verified" && "Biometric"].filter(Boolean).join(" + ")]].map(([k, v]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid rgba(250,228,207,.05)", fontSize: 15, fontFamily: sans }}>
                  <span style={{ color: "rgba(250,228,207,.7)" }}>{k}</span>
                  <span style={{ color: autumn, fontWeight: 600, textAlign: "right", maxWidth: "60%" }}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button style={{ ...btnP, flex: 1 }} onClick={() => {
                if (videoURL) URL.revokeObjectURL(videoURL);
                if (bioSessionId) { if (bioListenerRef.current) db.ref("sessions/" + bioSessionId).off("value", bioListenerRef.current); db.ref("sessions/" + bioSessionId).remove(); }
                setStep(0); setForm({ party1: "", party2: "", purpose: "", state: "", date: new Date().toISOString().split("T")[0], categories: [], customCategory: "" });
                setSig1Done(false); setSig2Done(false); setNdaImage(null); setVideoURL(null);
                setVideoError(null); setStreamReady(false); setRecording(false);
                setComplianceOpen(false); setNotesOpen(false);
                setBioSessionId(null); setBioQRImage(null); setBioStatus("waiting"); setBioResult(null); setReceiptImage(null); setSavedToVault(false);
              }}>+ New NDA</button>
            </div>
          </div>
        );
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }
  </script>
</body>
</html>
