function getWorkplaceDisclosureSection(state, sectionNum) {
  const data = STATE_DATA[state];
  if (!data) return null;
  if (data.tier === 1) {
    const specifics = {
      "California": `Nothing in this agreement prevents you from discussing or disclosing information about unlawful acts in the workplace, such as harassment or discrimination or any other conduct that you have reason to believe is unlawful. This provision is included pursuant to California Senate Bill 331 (the "Silenced No More Act") and applies to all disclosures relating to conditions in the workplace, including but not limited to harassment, discrimination, or retaliation based on any protected class under California law.`,
      "Washington": `Nothing in this agreement prevents you from discussing or disclosing information about unlawful acts in the workplace, including but not limited to harassment, discrimination, retaliation, wage-and-hour violations, or any other conduct that you have reason to believe is unlawful. This provision is included pursuant to Washington's Silenced No More Act (ESHB 1795), which covers all forms of illegal workplace conduct and applies retroactively to invalidate prior conflicting provisions.`,
      "Illinois": `Nothing in this agreement prevents you from discussing or disclosing information about unlawful employment practices, including but not limited to harassment, discrimination, or retaliation. You have the right to make truthful statements or disclosures regarding any unlawful employment practice. This provision is included pursuant to the Illinois Workplace Transparency Act (as amended 2026).`,
      "Oregon": `Nothing in this agreement prevents you from discussing or disclosing information about harassment, discrimination, or other unlawful conduct in the workplace. You retain the right to discuss workplace conditions and report unlawful behavior without restriction. This provision is included pursuant to the Oregon Workplace Fairness Act (SB 488).`,
      "Hawaii": `Nothing in this agreement prevents you from reporting or disclosing information about sexual harassment or sexual assault to the Hawaii Civil Rights Commission or any other governmental agency. This provision is included pursuant to Hawaii Act 47 (2023).`,
    };
    const verbatim = specifics[state] || specifics["California"];
    return { t: `${sectionNum}. Permitted Disclosures Regarding Unlawful Conduct`, b: `${verbatim} This Agreement does not limit any party's right to: (a) report suspected violations of law to any governmental agency or entity; (b) participate in any governmental investigation; or (c) file a charge or complaint with any governmental agency.` };
  }
  if (data.tier === 2) {
    const statRefs = {
      "Colorado": `the Colorado Protecting Opportunities and Workers' Rights Act (POWR Act)`,
      "Connecticut": `Connecticut Public Act 19-16`,
      "Maine": `Maine LD 965 (2022)`,
      "Maryland": `the Maryland Disclosing Sexual Harassment in the Workplace Act`,
      "Massachusetts": `Massachusetts law governing harassment settlement agreements`,
      "Nevada": `Nevada AB 192 (2025/26)`,
      "New Jersey": `New Jersey S121`,
      "New Mexico": `New Mexico law prohibiting NDAs regarding sexual harassment`,
      "New York": `New York General Obligations Law § 5-336`,
      "Vermont": `Vermont Act 183`,
    };
    const ref = statRefs[state] || "applicable state law";
    return { t: `${sectionNum}. Permitted Disclosures Regarding Unlawful Conduct`, b: `Nothing in this Agreement prevents or restricts either party from discussing or disclosing information about unlawful acts in the workplace, such as harassment or discrimination. This provision is included in accordance with ${ref}. This Agreement does not limit any party's right to: (a) report suspected violations of law to any governmental agency; (b) participate in any governmental investigation; or (c) file a charge or complaint with any governmental agency.` };
  }
  return { t: `${sectionNum}. Permitted Disclosures and Government Reporting`, b: `Nothing in this Agreement shall be construed to prevent or restrict either party from: (a) reporting suspected violations of law to any federal, state, or local governmental agency; (b) participating in or cooperating with any governmental investigation or proceeding; (c) filing a charge or complaint with any governmental agency; or (d) making disclosures protected under applicable whistleblower provisions of federal, state, or local law.` };
}

function getRemediesSection(state, sectionNum) {
  const data = STATE_DATA[state];
  const bondWaiverOk = data ? data.bondWaiver : true;
  if (bondWaiverOk) {
    return { t: `${sectionNum}. Remedies`, b: `The parties acknowledge that any breach of this Agreement may cause the Disclosing Party immediate and irreparable harm for which monetary damages would be inadequate. The Disclosing Party shall be entitled to seek equitable relief, including injunctions and specific performance, without proving actual damages and without posting any bond. The Receiving Party hereby waives any bond requirement. The prevailing party in any enforcement action shall recover its reasonable attorneys' fees, court costs, and other litigation expenses.` };
  }
  return { t: `${sectionNum}. Remedies`, b: `The parties acknowledge that any breach of this Agreement may cause the Disclosing Party immediate and irreparable harm. The Disclosing Party shall be entitled to seek equitable relief without proving actual damages. The State of **STATE** may require posting of a bond, and such requirements shall be governed by applicable law. The prevailing party in any enforcement action shall recover its reasonable attorneys' fees, court costs, and other litigation expenses.` };
}

const INFO_CATEGORIES = [
  { key: "trade_secrets", label: "Trade Secrets & Formulas", hint: "secret sauce, methods", legal: "trade secrets, proprietary formulas, and processes not generally known to the public" },
  { key: "source_code", label: "Source Code & Tech Specs", hint: "software, apps", legal: "proprietary source code, algorithms, software architectures, technical specifications, and system designs" },

];

function buildCategoryText(selectedKeys, customText) {
  const selected = INFO_CATEGORIES.filter(c => selectedKeys.includes(c.key));
  const parts = selected.map(c => c.legal);
  if (customText && customText.trim()) parts.push(customText.trim());
  if (parts.length === 0) return "";
  if (parts.length === 1) return parts[0];
  return parts.slice(0, -1).join("; ") + "; and " + parts[parts.length - 1];
}

function buildSections(state, categories, customCategory) {
  let n = 1;
  const sections = [];
  const catText = buildCategoryText(categories || [], customCategory || "");
  const catClause = catText ? `Confidential Information includes, but is not limited to: ${catText}.` : `Confidential Information includes any proprietary information relating to the Purpose.`;

  sections.push({ t: `${n++}. Definition of Confidential Information`, b: `"Confidential Information" means any non-public information disclosed by either party in connection with the Purpose, whether orally, in writing, or electronically. ${catClause} Excluded: (a) general professional skills and experience the Receiving Party possessed independently; (b) general industry knowledge; (c) any individual's right to use their professional competence in their trade or profession.` });
  sections.push({ t: `${n++}. Obligations of the Receiving Party`, b: `The Receiving Party agrees to: (a) hold all Confidential Information in strict confidence; (b) not disclose to any third party without prior written consent; (c) limit access to those with a demonstrable need to know who are bound by equivalent confidentiality obligations; (d) use Confidential Information solely for the Purpose; (e) promptly notify of any unauthorized disclosure; and (f) cooperate to remedy any breach.` });
  sections.push({ t: `${n++}. Exclusions from Confidential Information`, b: `Confidential Information excludes information that: (a) is or becomes publicly available through no fault of the Receiving Party; (b) was in the Receiving Party's lawful possession prior to disclosure; (c) is independently developed without reference to any Confidential Information; (d) is rightfully received from a third party without restriction; or (e) is required to be disclosed by law or court order, provided the Disclosing Party receives prompt written notice and opportunity to seek a protective order.` });
  sections.push({ t: `${n++}. Restriction on Use (Non-Use Obligation)`, b: `Confidential Information is disclosed solely for the Purpose. The Receiving Party shall not use it for: (a) developing competing products or services; (b) reverse engineering; (c) improving internal processes outside the Purpose; or (d) gaining any commercial advantage not contemplated by this Agreement. Any use outside the Purpose constitutes a material breach.` });
  sections.push({ t: `${n++}. Term and Survival`, b: `This Agreement remains in effect for two (2) years from the Effective Date, unless terminated earlier by either party with thirty (30) days prior written notice. Confidentiality and non-use obligations survive for an additional three (3) years following expiration or termination, or for so long as the Confidential Information qualifies as a trade secret under applicable law, whichever is longer.` });
  sections.push({ t: `${n++}. Return and Destruction of Materials`, b: `Upon expiration, termination, or written request, the Receiving Party shall: (a) return all tangible materials containing Confidential Information; (b) permanently delete all electronic copies from all systems and storage media; (c) remove Confidential Information from all collaborative platforms; and (d) provide written certification of compliance within ten (10) business days.` });
  sections.push(getRemediesSection(state, n++));
  const disclosure = getWorkplaceDisclosureSection(state, n);
  if (disclosure) { sections.push(disclosure); n++; }
  sections.push({ t: `${n++}. Federal Whistleblower Immunity Notice`, b: `Pursuant to the Defend Trade Secrets Act of 2016 (18 U.S.C. § 1833(b)): An individual shall not be held criminally or civilly liable under any federal or state trade secret law for disclosure of a trade secret made in confidence to a government official or attorney solely for reporting a suspected violation of law, or in a court filing made under seal. Failure to include this notice limits available remedies in any trade secret action.` });
  sections.push({ t: `${n++}. No License or Ownership Transfer`, b: `Nothing herein grants any license or right under any patent, copyright, trademark, trade secret, or other intellectual property right. All Confidential Information remains the exclusive property of the Disclosing Party. Execution of this Agreement does not obligate either party to enter any further agreement or business relationship.` });
  sections.push({ t: `${n++}. Governing Law and Jurisdiction`, b: `This Agreement shall be governed by the laws of the State of **STATE**, without regard to conflict of laws principles. Any dispute shall be submitted to the exclusive jurisdiction of the state and federal courts located in the State of **STATE**.` });
  sections.push({ t: `${n++}. Entire Agreement and Amendments`, b: `This Agreement constitutes the entire agreement between the parties and supersedes all prior discussions, whether oral or written. No amendment shall be effective unless in writing and signed by authorized representatives of both parties.` });
  return sections;
}

function getComplianceItems(state) {
  const data = STATE_DATA[state];
  if (!data) return [];
  const items = [];
  items.push({ ok: true, label: data.utsa ? "Trade Secret Protection (UTSA)" : "Trade Secret Protection (Common Law)", detail: data.utsa ? "Uniform Trade Secrets Act adopted" : "Governed by state common law" });
  items.push({ ok: true, label: "Federal Whistleblower Notice (DTSA)", detail: "18 U.S.C. § 1833(b) immunity notice included" });
  if (data.tier === 1) items.push({ ok: true, label: `Workplace Disclosure (${data.statute})`, detail: "Mandatory verbatim language included" });
  else if (data.tier === 2) items.push({ ok: true, label: `Workplace Disclosure (${data.statute})`, detail: "State-specific disclosure provisions included" });
  else items.push({ ok: true, label: "Government Reporting Rights", detail: "Best-practice disclosure language included" });
  items.push(data.bondWaiver ? { ok: true, label: "Bond Waiver", detail: "Enforceable in this state" } : { ok: false, label: "Bond Waiver", detail: "May not be enforceable; language adjusted" });
  items.push({ ok: true, label: "Fee-Shifting Clause", detail: "Prevailing party recovers attorneys' fees" });
  items.push({ ok: true, label: "General Skills Carve-Out", detail: "Protects right to work in profession" });
  return items;
}

function fmtDate(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
}

function wrapText(ctx, text, maxWidth) {
  const words = text.split(" ");
  const lines = [];
  let current = "";
  for (const word of words) {
    const test = current ? current + " " + word : word;
    if (ctx.measureText(test).width > maxWidth) { if (current) lines.push(current); current = word; }
    else current = test;
  }
  if (current) lines.push(current);
  return lines;
}

function getSupportedMimeType() {
  if (typeof MediaRecorder === "undefined") return null;
  const types = ["video/mp4;codecs=h264", "video/mp4", "video/webm;codecs=vp9,opus", "video/webm;codecs=vp8,opus", "video/webm"];
  return types.find(t => { try { return MediaRecorder.isTypeSupported(t); } catch { return false; } }) || null;
}

function SignatureCanvas({ label, canvasRef, onDraw }) {
  const [hasDrawn, setHasDrawn] = useState(false);
  const drawingRef = useRef(false);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * 2; canvas.height = rect.height * 2;
    const ctx = canvas.getContext("2d");
    ctx.scale(2, 2); ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.lineWidth = 2.5; ctx.strokeStyle = "#0a0f23";
    function getPos(e) { const r = canvas.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return { x: t.clientX - r.left, y: t.clientY - r.top }; }
    function onTouchStart(e) { e.preventDefault(); e.stopPropagation(); drawingRef.current = true; setHasDrawn(true); onDraw(); const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
    function onTouchMove(e) { if (!drawingRef.current) return; e.preventDefault(); e.stopPropagation(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
    function onTouchEnd(e) { e.preventDefault(); drawingRef.current = false; }
    function onMouseDown(e) { drawingRef.current = true; setHasDrawn(true); onDraw(); const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
    function onMouseMove(e) { if (!drawingRef.current) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
    function onMouseUp() { drawingRef.current = false; }
    canvas.addEventListener("touchstart", onTouchStart, { passive: false });
    canvas.addEventListener("touchmove", onTouchMove, { passive: false });
    canvas.addEventListener("touchend", onTouchEnd, { passive: false });
    canvas.addEventListener("mousedown", onMouseDown);
    canvas.addEventListener("mousemove", onMouseMove);
    canvas.addEventListener("mouseup", onMouseUp);
    canvas.addEventListener("mouseleave", onMouseUp);
    return () => {
      canvas.removeEventListener("touchstart", onTouchStart);
      canvas.removeEventListener("touchmove", onTouchMove);
      canvas.removeEventListener("touchend", onTouchEnd);
      canvas.removeEventListener("mousedown", onMouseDown);
      canvas.removeEventListener("mousemove", onMouseMove);
      canvas.removeEventListener("mouseup", onMouseUp);
      canvas.removeEventListener("mouseleave", onMouseUp);
    };
  }, []);
  const clear = () => { const c = canvasRef.current; c.getContext("2d").clearRect(0, 0, c.width, c.height); setHasDrawn(false); };
  const sans = "system-ui, -apple-system, sans-serif";
  const firm = "#0a0f23";
  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <span style={{ fontSize: 12, fontWeight: 700, color: firm, opacity: 0.5, letterSpacing: ".04em", textTransform: "uppercase", fontFamily: sans }}>{label}</span>
        {hasDrawn && <button onClick={clear} style={{ fontSize: 12, color: "#c0392b", background: "none", border: "none", cursor: "pointer", fontWeight: 700, fontFamily: sans }}>Clear</button>}
      </div>
      <div style={{ position: "relative", borderRadius: 12, overflow: "hidden", border: "2px dashed rgba(10,15,35,.2)", background: "#fdf6ef", touchAction: "none" }}>
        <canvas ref={canvasRef} style={{ display: "block", width: "100%", height: 140, touchAction: "none", cursor: "crosshair" }} />
        {!hasDrawn && <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none", color: "rgba(10,15,35,.55)", fontSize: 15, fontStyle: "italic", fontFamily: "Georgia, serif" }}>Sign here</div>}
        <div style={{ position: "absolute", bottom: 20, left: 20, right: 20, height: 1, background: "rgba(10,15,35,.15)", pointerEvents: "none" }} />
      </div>
    </div>
  );
}

function NDA() {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({ party1: "", party2: "", purpose: "", state: "", date: new Date().toISOString().split("T")[0], categories: [], customCategory: "" });
  const [sig1Done, setSig1Done] = useState(false);
  const [sig2Done, setSig2Done] = useState(false);
  const [ndaImage, setNdaImage] = useState(null);
  const [generating, setGenerating] = useState(false);
  const [complianceOpen, setComplianceOpen] = useState(false);
  const [notesOpen, setNotesOpen] = useState(false);
  const [videoEnabled, setVideoEnabled] = useState(true);
  const [recording, setRecording] = useState(false);
  const [videoURL, setVideoURL] = useState(null);
  const [streamReady, setStreamReady] = useState(false);
  const [videoError, setVideoError] = useState(null);
  const mediaRecorderRef = useRef(null);
  const streamRef = useRef(null);
  const chunksRef = useRef([]);
  const previewRef = useRef(null);
  const sig1Ref = useRef(null);
  const sig2Ref = useRef(null);

  const up = (f) => (e) => setForm(prev => ({ ...prev, [f]: e.target.value }));
  const toggleCat = (key) => setForm(prev => ({ ...prev, categories: prev.categories.includes(key) ? prev.categories.filter(k => k !== key) : [...prev.categories, key] }));
  const canProceed = form.party1.trim() && form.party2.trim() && form.purpose.trim() && form.state && (form.categories.length > 0 || (form.customCategory && form.customCategory.trim()));
  const sections = useMemo(() => buildSections(form.state, form.categories, form.customCategory), [form.state, form.categories, form.customCategory]);
  const compliance = useMemo(() => getComplianceItems(form.state), [form.state]);
  const stateData = STATE_DATA[form.state] || null;

  useEffect(() => {
    const style = document.createElement("style");
    style.textContent = `@keyframes recPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.8)}} @keyframes witnessSlideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}`;
    document.head.appendChild(style);
    return () => style.remove();
  }, []);

  useEffect(() => {
    if (step === 2) { document.body.style.overflow = "hidden"; document.documentElement.style.overflow = "hidden"; }
    else { document.body.style.overflow = ""; document.documentElement.style.overflow = ""; }
    return () => { document.body.style.overflow = ""; document.documentElement.style.overflow = ""; };
  }, [step]);

  useEffect(() => {
    if (step === 2 && videoEnabled) startRecording();
    return () => { if (step === 2) releaseStream(); };
  }, [step]);

  useEffect(() => {
    if (step !== 2) return;
    if (videoEnabled) { setVideoError(null); startRecording(); }
    else stopAndDiscard();
  }, [videoEnabled]);

  function releaseStream() { if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; } setStreamReady(false); }

  async function startRecording() {
    if (!navigator.mediaDevices || typeof MediaRecorder === "undefined") { setVideoError("Camera API not available"); setVideoEnabled(false); return; }
    setVideoError(null);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }, audio: true });
      streamRef.current = stream;
      setStreamReady(true);
      if (previewRef.current) { previewRef.current.srcObject = stream; try { await previewRef.current.play(); } catch (_) {} }
      chunksRef.current = [];
      const mimeType = getSupportedMimeType();
      const mr = new MediaRecorder(stream, mimeType ? { mimeType } : {});
      mr.ondataavailable = e => { if (e.data && e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = () => { const blob = new Blob(chunksRef.current, { type: mimeType || "video/mp4" }); setVideoURL(URL.createObjectURL(blob)); };
      mediaRecorderRef.current = mr;
      mr.start(100);
      setRecording(true);
    } catch (err) { console.warn("Camera unavailable:", err); setVideoError(err.message); setVideoEnabled(false); }
  }

  function stopAndSave() {
    if (mediaRecorderRef.current && mediaRecorderRef.current.state !== "inactive") mediaRecorderRef.current.stop();
    releaseStream(); setRecording(false);
  }

  function stopAndDiscard() {
    if (mediaRecorderRef.current) { mediaRecorderRef.current.ondataavailable = null; mediaRecorderRef.current.onstop = null; if (mediaRecorderRef.current.state !== "inactive") mediaRecorderRef.current.stop(); }
    releaseStream(); setRecording(false);
  }

  const handleComplete = useCallback(() => { stopAndSave(); generateImage(); }, [recording]);

  const generateImage = useCallback(() => {
    setGenerating(true);
    setTimeout(() => {
      const scale = 3, W = 650 * scale, margin = 50 * scale, textW = W - margin * 2;

      const ctx = c.getContext("2d");
      const lineH = 16 * scale, headH = 22 * scale, gapH = 10 * scale, sectionGap = 14 * scale;

      const introLines = wrapText(ctx, introText, textW);
      measuredH += introLines.length * lineH + gapH * 2;

      ctx.textAlign = "left"; ctx.fillStyle = "#0a0f23"; ctx.font = `${12 * scale}px Georgia, serif`;
      introLines.forEach(line => { ctx.fillText(line, margin, y); y += lineH; }); y += gapH * 2;
      sections.forEach(s => {

      });
      y += 10 * scale;
      ctx.strokeStyle = "#ccc"; ctx.lineWidth = scale; ctx.beginPath(); ctx.moveTo(margin, y); ctx.lineTo(W - margin, y); ctx.stroke(); y += 20 * scale;
      ctx.font = `italic ${11 * scale}px Georgia, serif`; ctx.fillStyle = "#444";

      const sigW = (textW - 20 * scale) / 2, sigH = 50 * scale;

        ctx.strokeStyle = "#888"; ctx.lineWidth = scale; ctx.beginPath(); ctx.moveTo(xPos, y + sigH + 5 * scale); ctx.lineTo(xPos + sigW, y + sigH + 5 * scale); ctx.stroke();
        ctx.font = `${10 * scale}px Georgia, serif`; ctx.fillStyle = "#0a0f23"; ctx.fillText(i === 0 ? form.party1 : form.party2, xPos, y + sigH + 22 * scale);
        ctx.fillStyle = "#888"; ctx.fillText(i === 0 ? "Party A" : "Party B", xPos, y + sigH + 36 * scale); ctx.fillText("Date: " + fd, xPos, y + sigH + 50 * scale);
      });

            <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at center, transparent 45%, rgba(5,8,16,.55) 100%)", pointerEvents: "none" }} />
            {[{ top: 8, left: 8, bw: "1.5px 0 0 1.5px" }, { top: 8, right: 8, bw: "1.5px 1.5px 0 0" }, { bottom: 8, left: 8, bw: "0 0 1.5px 1.5px" }, { bottom: 8, right: 8, bw: "0 1.5px 1.5px 0" }].map((pos, i) => (
              <div key={i} style={{ position: "absolute", ...pos, bw: undefined, width: 14, height: 14, borderColor: "rgba(250,228,207,.35)", borderStyle: "solid", borderWidth: pos.bw, pointerEvents: "none" }} />
            ))}
            {recording && (
              <div style={{ position: "absolute", top: 10, right: 10, display: "flex", alignItems: "center", gap: 5, background: "rgba(5,8,16,.72)", borderRadius: 20, padding: "4px 9px" }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#c0392b", animation: "recPulse 1.4s ease-in-out infinite" }} />
                <span style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,.8)", letterSpacing: ".12em", fontFamily: sans }}>REC</span>
              </div>
            )}
            <div style={{ position: "absolute", bottom: 9, left: 12, fontSize: 10, color: "rgba(250,228,207,.35)", fontFamily: sans, letterSpacing: ".09em", fontWeight: 600, textTransform: "uppercase", pointerEvents: "none" }}>Witness Recording</div>
          </div>
        )}
        <div style={{ background: "#fff", borderRadius: 16, border: "1px solid rgba(10,15,35,.08)", padding: "18px 14px", boxShadow: "0 2px 16px rgba(10,15,35,.04)" }}>
          <SignatureCanvas label={`${form.party1} (Party A)`} canvasRef={sig1Ref} onDraw={() => setSig1Done(true)} />
          <SignatureCanvas label={`${form.party2} (Party B)`} canvasRef={sig2Ref} onDraw={() => setSig2Done(true)} />
        </div>
        <div style={{ display: "flex", gap: 10, marginTop: 22 }}>
          <button style={{ ...btnO, flex: 1, background: firm, color: autumn, boxShadow: "none", border: "none" }} onClick={() => { stopAndDiscard(); setStep(1); }}>← Back</button>
          <button style={{ ...btnG, flex: 2 }} onClick={handleComplete}>{generating ? "Generating…" : "Complete ✓"}</button>
        </div>
        <p style={{ fontSize: 11, color: "rgba(10,15,35,.3)", textAlign: "center", marginTop: 12, lineHeight: 1.5, fontFamily: sans }}>By signing, both parties agree to be bound by the terms of this NDA.</p>
      </div>
    );
  }

  if (step === 3) {
    const fd = fmtDate(form.date);
    const s1 = form.party1.replace(/\s+/g, "_"), s2 = form.party2.replace(/\s+/g, "_");
    return (
      <div style={{ maxWidth: 500, margin: "0 auto", padding: "20px 16px", fontFamily: "Georgia, serif" }}>
        <div style={{ textAlign: "center", marginBottom: 20 }}>
          <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 64, height: 64, borderRadius: "50%", background: "#1a7a5a", boxShadow: "0 4px 20px rgba(26,122,90,.3)", marginBottom: 12 }}>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: firm, margin: "0 0 6px" }}>Agreement Signed</h2>
          <p style={{ fontSize: 14, color: "rgba(10,15,35,.55)", margin: "0 0 4px", lineHeight: 1.6, fontFamily: sans }}><strong style={{ color: firm }}>Long-press the image below</strong> to save or share</p>
          <p style={{ fontSize: 12, color: "rgba(10,15,35,.3)", margin: 0, fontFamily: sans }}>iOS: "Add to Photos" or "Share" &nbsp;|&nbsp; Desktop: right-click → Save</p>
        </div>
        {ndaImage && <div style={{ borderRadius: 12, overflow: "hidden", border: "1px solid rgba(10,15,35,.08)", boxShadow: "0 2px 20px rgba(10,15,35,.06)", marginBottom: 16 }}><img src={ndaImage} alt="Signed NDA Document" style={{ width: "100%", display: "block" }} /></div>}
        {videoURL && (
          <div style={{ background: "#fff", borderRadius: 16, border: "1px solid rgba(10,15,35,.08)", overflow: "hidden", marginBottom: 16, boxShadow: "0 2px 16px rgba(10,15,35,.04)" }}>
            <div style={{ padding: "13px 16px 11px", borderBottom: "1px solid rgba(10,15,35,.06)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: firm, fontFamily: sans, letterSpacing: ".06em", textTransform: "uppercase" }}>Witness Recording</div>
                <div style={{ fontSize: 11, color: "rgba(10,15,35,.35)", fontFamily: sans, marginTop: 2 }}>{form.party2} · {fd}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 5, background: "#edfaf4", borderRadius: 20, padding: "4px 10px" }}>
                <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="5" fill="#1a7a5a"/><polyline points="2.5 5 4 6.5 7.5 3" fill="none" stroke="#fff" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                <span style={{ fontSize: 10, fontWeight: 700, color: "#1a7a5a", fontFamily: sans, letterSpacing: ".05em" }}>CAPTURED</span>
              </div>
            </div>
            <video src={videoURL} controls playsInline style={{ width: "100%", display: "block", background: "#050810", maxHeight: 230 }} />
            <div style={{ padding: "10px 14px" }}>
              <a href={videoURL} download={`Pact_${s1}_${s2}_${form.date}.mp4`} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: "11px", borderRadius: 10, background: firm, color: autumn, fontSize: 13, fontWeight: 700, fontFamily: sans, textDecoration: "none", letterSpacing: ".02em" }}>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                Save Recording
              </a>
            </div>
          </div>
        )}
        <div style={{ background: autumn, borderRadius: 14, padding: 18, marginBottom: 20, border: "1px solid rgba(10,15,35,.06)" }}>
          {[["Parties", `${form.party1} & ${form.party2}`], ["Purpose", form.purpose], ["Type", "Mutual NDA"], ["Duration", "2 years + 3 year survival"], ["Governing Law", `State of ${form.state}`], ["Sections", `${sections.length}`], ["Date", fd], ["Verification", videoURL ? "Signature + Video" : "Signature"]].map(([k, v]) => (
            <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid rgba(10,15,35,.07)", fontSize: 13, fontFamily: sans }}>
              <span style={{ color: "rgba(10,15,35,.4)" }}>{k}</span>
              <span style={{ color: firm, fontWeight: 600, textAlign: "right", maxWidth: "60%" }}>{v}</span>
            </div>
          ))}
        </div>
        <button style={btnO} onClick={() => { if (videoURL) URL.revokeObjectURL(videoURL); setStep(0); setForm({ party1: "", party2: "", purpose: "", state: "", date: new Date().toISOString().split("T")[0], categories: [], customCategory: "" }); setSig1Done(false); setSig2Done(false); setNdaImage(null); setVideoURL(null); setRecording(false); setComplianceOpen(false); setNotesOpen(false); }}>Create Another NDA</button>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(NDA));
</script>
</body>
</html>
